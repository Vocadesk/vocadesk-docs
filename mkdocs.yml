site_name: callcat.ai (former vocadesk) Documentation
site_description: Guides and reference for the callcat.ai (former vocadesk) AI voice-agent platform.
site_url: https://docs.vocadesk.com/
repo_url: https://github.com/Vocadesk/vocadesk-docs
repo_name: Vocadesk/vocadesk-docs
edit_uri: edit/main/docs/
copyright: © callcat.ai (former vocadesk)

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - tags:
      tags_file: tags.md

hooks:
  - hooks/docs_hooks.py

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link to this section
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Vocadesk

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Accounts & onboarding: accounts.md
  - Core concepts: concepts.md
  - Clients: clients.md
  - Agents:
      - agents/index.md
      - Configuring an agent: agents/configuration.md
      - Voices & languages: agents/voices.md
      - Conversation design: agents/conversation-design.md
      - Call forwarding & transfers: agents/call-forwarding.md
      - Testing your agent: agents/testing.md
  - Phone numbers: phone-numbers.md
  - Web calls & embeds: embeds.md
  - Calls: calls.md
  - Billing: billing.md
  - Settings: settings.md
  - Administration: admin.md
  - For developers:
      - How callcat.ai (former vocadesk) works: architecture.md
      - Embedding on your website: embed-integration.md
  - Troubleshooting: troubleshooting.md
  - Glossary: glossary.md
  - Tags: tags.md
